
<div style="display:flex;gap:20px;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap">
  <span style="display:flex;align-items:center;gap:5px"><span style="width:28px;height:2px;background:#378ADD;display:inline-block"></span>RMB per USD (left axis)</span>
  <span style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:2px;background:#D85A30;border-top:2px dashed #D85A30;display:inline-block"></span>CPI inflation % (right axis)</span>
</div>
<div style="position:relative;width:100%;height:300px">
  <canvas id="dualChart" role="img" aria-label="Dual-axis chart showing RMB per USD exchange rate and China CPI inflation from 2018 to 2024">RMB/USD ranged from 6.5 to 7.3; CPI ranged from 0.2% to 2.9%.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['2018','2019','2020','2021','2022','2023','2024'];
const rmb    = [6.62, 6.91, 6.90, 6.45, 6.74, 7.08, 7.18];
const cpi    = [2.1,  2.9,  2.5,  0.9,  2.0,  0.2,  0.3];
new Chart(document.getElementById('dualChart'), {
  data: {
    labels,
    datasets: [
      {
        type: 'line',
        label: 'RMB per USD',
        data: rmb,
        yAxisID: 'y1',
        borderColor: '#378ADD',
        backgroundColor: 'rgba(55,138,221,0.08)',
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: '#378ADD',
        fill: true,
        tension: 0.3,
        borderDash: [],
      },
      {
        type: 'line',
        label: 'CPI inflation %',
        data: cpi,
        yAxisID: 'y2',
        borderColor: '#D85A30',
        backgroundColor: 'rgba(216,90,48,0)',
        borderWidth: 2,
        borderDash: [6,3],
        pointRadius: 4,
        pointStyle: 'triangle',
        pointBackgroundColor: '#D85A30',
        tension: 0.3,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.datasetIndex === 0
            ? ` RMB/USD: ${ctx.parsed.y.toFixed(2)}`
            : ` CPI: ${ctx.parsed.y.toFixed(1)}%`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(128,128,128,0.1)' },
        ticks: { color: '#888780', font: { size: 12 } }
      },
      y1: {
        type: 'linear',
        position: 'left',
        min: 6.0, max: 7.6,
        title: { display: true, text: 'RMB per USD', color: '#378ADD', font: { size: 11 } },
        grid: { color: 'rgba(128,128,128,0.1)' },
        ticks: { color: '#378ADD', font: { size: 11 }, callback: v => v.toFixed(2) }
      },
      y2: {
        type: 'linear',
        position: 'right',
        min: 0, max: 4,
        title: { display: true, text: 'CPI %', color: '#D85A30', font: { size: 11 } },
        grid: { drawOnChartArea: false },
        ticks: { color: '#D85A30', font: { size: 11 }, callback: v => v.toFixed(1)+'%' }
      }
    }
  }
});
</script>
